<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/png" sizes="256x256" href="/simdeck.png" />
    <title>SimDeck</title>
    <script>
      try {
        localStorage.removeItem("xcw-debug-visible");
        const key = "xcw-ui-state";
        const state = JSON.parse(localStorage.getItem(key) || "{}");
        if (state && Object.prototype.hasOwnProperty.call(state, "search")) {
          delete state.search;
          localStorage.setItem(key, JSON.stringify(state));
        }
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (() => {
        const timeout = window.setTimeout(() => {
          const root = document.getElementById("root");
          if (!root || root.childElementCount > 0 || root.textContent.trim()) {
            return;
          }
          const key = "simdeck-root-watchdog-reload-at";
          const lastReloadAt = Number(sessionStorage.getItem(key) || "0");
          if (Date.now() - lastReloadAt < 30000) {
            return;
          }
          sessionStorage.setItem(key, String(Date.now()));
          const url = new URL(window.location.href);
          url.searchParams.set("_simdeckReload", String(Date.now()));
          window.location.replace(url);
        }, 4000);
        window.addEventListener(
          "beforeunload",
          () => window.clearTimeout(timeout),
          { once: true },
        );
      })();
    </script>
  </body>
</html>
